<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Metabólico — Aaron</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f5f5f3;
  --surface:  #ffffff;
  --surface2: #f0f0ed;
  --border:   #e4e4e0;
  --text:     #111110;
  --text2:    #6f6f6b;
  --text3:    #a8a8a4;
  --blue:     #1a56db;
  --blue-bg:  #eef2ff;
  --green:    #166534;
  --green-bg: #f0fdf4;
  --red:      #991b1b;
  --red-bg:   #fef2f2;
  --amber:    #92400e;
  --amber-bg: #fffbeb;
  --purple:   #5b21b6;
  --r:        8px;
  --rl:       12px;
  --font:     'DM Sans', sans-serif;
  --mono:     'DM Mono', monospace;
}

body.dark {
  --bg:       #111110;
  --surface:  #1c1c1a;
  --surface2: #252523;
  --border:   #2e2e2b;
  --text:     #f5f5f3;
  --text2:    #a8a8a4;
  --text3:    #6f6f6b;
  --blue:     #6d9ef7;
  --blue-bg:  #1e2a4a;
  --green:    #86efac;
  --green-bg: #14532d;
  --red:      #fca5a5;
  --red-bg:   #450a0a;
  --amber:    #fcd34d;
  --amber-bg: #451a03;
  --purple:   #c4b5fd;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
  transition: background .2s, color .2s;
}

/* SHELL */
.shell { display: grid; grid-template-columns: 188px 1fr; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
}
.logo { padding: 0 16px 18px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
.logo-t { font-size: 13px; font-weight: 600; letter-spacing: -.02em; }
.logo-s { font-size: 10px; color: var(--text2); margin-top: 2px; font-weight: 400; }
.nav { display: flex; flex-direction: column; gap: 1px; padding: 0 8px; }
.ni {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; font-size: 12px; font-weight: 500;
  color: var(--text2); cursor: pointer;
  border-radius: var(--r); border-left: 2px solid transparent;
  transition: all .15s;
}
.ni:hover { background: var(--surface2); color: var(--text); }
.ni.on { color: var(--text); background: var(--blue-bg); border-left: 2px solid var(--blue); }
.ni svg { flex-shrink: 0; opacity: .7; }
.ni.on svg { opacity: 1; }

.sidebar-footer {
  margin-top: auto;
  padding: 14px 16px 0;
  border-top: 1px solid var(--border);
}
.sync-label { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
.sync-val { font-size: 11px; font-weight: 500; color: var(--text2); font-family: var(--mono); }
.sync-rel { font-size: 10px; color: var(--text3); margin-top: 1px; }

/* MAIN */
.main { padding: 22px 26px; min-height: 100vh; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.pg-t { font-size: 15px; font-weight: 600; letter-spacing: -.02em; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.chip { font-size: 11px; color: var(--text2); background: var(--surface); border: 1px solid var(--border); padding: 4px 10px; border-radius: var(--r); font-family: var(--mono); }
.dark-btn { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 11px; font-weight: 500; color: var(--text2); padding: 4px 10px; border-radius: var(--r); border: 1px solid var(--border); background: var(--surface); transition: all .15s; }
.dark-btn:hover { background: var(--surface2); }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 16px; }
.cl { font-size: 9px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }

/* LOADING */
.loading { display: flex; align-items: center; justify-content: center; height: 200px; gap: 8px; color: var(--text2); font-size: 12px; }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp .3s ease forwards; }

/* KPIs */
.kpis { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 12px; }
.kpi { background: var(--surface2); border-radius: var(--r); padding: 12px 14px; }
.kl { font-size: 9px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.kv { font-size: 22px; font-weight: 600; letter-spacing: -.03em; color: var(--text); line-height: 1; }
.kv small { font-size: 12px; font-weight: 400; color: var(--text2); letter-spacing: 0; }
.ks { font-size: 10px; margin-top: 4px; }
.cg { color: var(--green); } .cr { color: var(--red); } .cn { color: var(--text2); } .cb { color: var(--blue); } .cp { color: var(--purple); }

/* R1 */
.r1 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }

/* FAT ARC */
.fat-inner { display: flex; align-items: center; gap: 14px; }
.arc-wrap { position: relative; width: 108px; height: 108px; flex-shrink: 0; }
.arc-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.arc-pct { font-size: 24px; font-weight: 600; letter-spacing: -.03em; }
.arc-lbl { font-size: 8px; color: var(--text3); letter-spacing: .04em; text-transform: uppercase; }
.fat-right { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.status-pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; align-self: flex-start; }
.pill-red   { background: var(--red-bg);   color: var(--red); }
.pill-amber { background: var(--amber-bg); color: var(--amber); }
.pill-green { background: var(--green-bg); color: var(--green); }
.fat-stat { font-size: 11px; color: var(--text2); line-height: 1.7; }
.fat-stat b { color: var(--text); font-weight: 600; }
.ranges-row { display: flex; gap: 4px; flex-wrap: wrap; }
.rpill { display: flex; align-items: center; gap: 3px; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 600; }
.rpill-g  { background: var(--green-bg); color: var(--green); }
.rpill-b  { background: var(--blue-bg);  color: var(--blue); }
.rpill-a  { background: var(--amber-bg); color: var(--amber); }
.rpill-r  { background: var(--red-bg);   color: var(--red); }
.rdot { width: 5px; height: 5px; border-radius: 50%; }

/* PROYECCIÓN */
.pbar-wrap { margin: 4px 0 10px; }
.pbar-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--text2); margin-bottom: 4px; }
.pbar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; position: relative; }
.pbar-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .6s ease; }
.pr { display: grid; grid-template-columns: 1fr auto; align-items: start; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px; gap: 8px; }
.pr:last-child { border-bottom: none; }
.pr-l { color: var(--text2); }
.pr-r { font-weight: 600; text-align: right; font-family: var(--mono); font-size: 11px; }
.pr-note { font-size: 9px; color: var(--text3); text-align: right; margin-top: 1px; }

/* ESTADO METABÓLICO */
.eg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.eg { background: var(--surface2); border-radius: var(--r); padding: 8px 10px; }
.eg-l { font-size: 9px; color: var(--text3); margin-bottom: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
.eg-v { font-size: 12px; font-weight: 600; color: var(--text); font-family: var(--mono); }
.tend-num { font-size: 28px; font-weight: 600; letter-spacing: -.04em; margin-top: 8px; font-family: var(--mono); }
.tend-label { font-size: 10px; color: var(--text2); margin-top: 1px; }

/* R2 */
.r2 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.cw { position: relative; height: 150px; width: 100%; }

/* TELEMETRÍA */
.mr { display: grid; grid-template-columns: 1fr 58px 46px; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
.mr:last-child { border-bottom: none; }
.mn { color: var(--text2); }
.mv { font-weight: 600; text-align: right; font-family: var(--mono); font-size: 11px; }
.md { text-align: right; }
.badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
.b-red   { background: var(--red-bg);   color: var(--red); }
.b-amber { background: var(--amber-bg); color: var(--amber); }
.b-green { background: var(--green-bg); color: var(--green); }
.nd { color: var(--text3); font-size: 10px; }

/* ALERTAS */
.al-box { display: flex; flex-direction: column; gap: 5px; }
.al { display: flex; gap: 7px; padding: 7px 9px; border-radius: var(--r); font-size: 10px; line-height: 1.4; }
.al-rojo   { background: var(--red-bg);   border-left: 2px solid var(--red);   color: var(--red); }
.al-amarillo { background: var(--amber-bg); border-left: 2px solid var(--amber); color: var(--amber); }
.al-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }

/* MACROS */
.macros-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.mg { background: var(--surface2); border-radius: var(--r); padding: 8px 10px; text-align: center; }
.mg-l { font-size: 9px; color: var(--text3); margin-bottom: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
.mg-v { font-size: 16px; font-weight: 600; font-family: var(--mono); letter-spacing: -.02em; }

/* PLAN HOY */
.plan-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 8px; }
.pmeal { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.pmeal-h { padding: 5px 8px; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
.pmeal-h.gym  { background: #dbeafe; color: #1e3a5f; }
.pmeal-h.col1 { background: #f0fdf4; color: #14532d; }
.pmeal-h.alm  { background: var(--surface2); color: var(--text2); }
.pmeal-h.col2 { background: #fdf4ff; color: #581c87; }
.pmeal-h.cen  { background: #eff6ff; color: #1e40af; }
.pmeal-h.rut  { background: #fef3c7; color: #78350f; }
body.dark .pmeal-h.gym  { background: #1e3a5f; color: #bfdbfe; }
body.dark .pmeal-h.col1 { background: #14532d; color: #bbf7d0; }
body.dark .pmeal-h.col2 { background: #3b0764; color: #e9d5ff; }
body.dark .pmeal-h.cen  { background: #1e2a4a; color: #93c5fd; }
body.dark .pmeal-h.rut  { background: #451a03; color: #fde68a; }
.pmeal-b { padding: 7px 8px; font-size: 10px; color: var(--text); line-height: 1.5; }

/* PROGRESO */
.prog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.prog-chart-wrap { position: relative; height: 190px; }
.range-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
.rtab { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); color: var(--text2); background: var(--surface2); transition: all .15s; }
.rtab.on { background: var(--blue); color: white; border-color: var(--blue); }

/* PLAN SEMANAL */
.plan-day-card { border: 1px solid var(--border); border-radius: var(--rl); overflow: hidden; margin-bottom: 10px; }
.plan-day-hd { display: flex; align-items: center; gap: 10px; padding: 8px 12px; }
.plan-day-hd.gym   { background: #dbeafe; } .plan-day-hd.casa { background: #dcfce7; }
.plan-day-hd.finde { background: #fef9c3; } .plan-day-hd.reset { background: var(--surface2); }
body.dark .plan-day-hd.gym   { background: #1e3a5f; }
body.dark .plan-day-hd.casa  { background: #14532d; }
body.dark .plan-day-hd.finde { background: #451a03; }
.plan-day-name { font-size: 12px; font-weight: 600; }
.plan-day-name.gym { color: #1e3a5f; } .plan-day-name.casa { color: #14532d; }
.plan-day-name.finde { color: #713f12; } .plan-day-name.reset { color: var(--text2); }
body.dark .plan-day-name.gym  { color: #bfdbfe; }
body.dark .plan-day-name.casa { color: #bbf7d0; }
body.dark .plan-day-name.finde{ color: #fde68a; }
.plan-day-sub { font-size: 10px; margin-left: auto; color: var(--text2); }
.plan-meals { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); }
.plan-meal { padding: 8px 10px; border-right: 1px solid var(--border); border-top: 1px solid var(--border); }
.plan-meal:last-child { border-right: none; }
.plan-meal-l { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text3); margin-bottom: 3px; }
.plan-meal-t { font-size: 10px; color: var(--text); line-height: 1.5; }

/* REPORTES */
.rep-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.rep-table th { text-align: left; padding: 7px 10px; color: var(--text3); font-size: 9px; text-transform: uppercase; letter-spacing: .06em; font-weight: 600; border-bottom: 1px solid var(--border); }
.rep-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
.rep-table tr:last-child td { border-bottom: none; }
.rep-table tr:hover td { background: var(--surface2); }
.dl-btn { font-size: 10px; font-weight: 600; color: var(--blue); text-decoration: none; padding: 3px 8px; border: 1px solid var(--blue-bg); background: var(--blue-bg); border-radius: 4px; transition: all .15s; }
.dl-btn:hover { background: var(--blue); color: white; }

/* MIMO ESPAÑOL */
.mimo-desc { font-size: 10px; color: var(--text2); line-height: 1.5; margin-top: 4px; }

.section { display: none; }
.section.on { display: block; }
</style>
</head>
<body>
<div class="shell">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <div class="logo-t">Control Metabólico</div>
    <div class="logo-s">Aaron · Sistema autónomo</div>
  </div>
  <div class="nav">
    <div class="ni on" onclick="nav('dashboard',this)">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="currentColor"/><rect x="8" y="1" width="5" height="5" rx="1" fill="currentColor" opacity=".4"/><rect x="1" y="8" width="5" height="5" rx="1" fill="currentColor" opacity=".4"/><rect x="8" y="8" width="5" height="5" rx="1" fill="currentColor" opacity=".4"/></svg>
      Dashboard
    </div>
    <div class="ni" onclick="nav('progreso',this)">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><polyline points="1,11 4,7 7,9 10,4 13,6" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      Progreso
    </div>
    <div class="ni" onclick="nav('plan',this)">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2" fill="none"/><line x1="1" y1="6" x2="13" y2="6" stroke="currentColor" stroke-width="1.2"/><line x1="4" y1="0" x2="4" y2="4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="10" y1="0" x2="10" y2="4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Plan semanal
    </div>
    <div class="ni" onclick="nav('reportes',this)">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 1h10a1 1 0 011 1v10a1 1 0 01-1 1H2a1 1 0 01-1-1V2a1 1 0 011-1z" stroke="currentColor" stroke-width="1.2" fill="none"/><line x1="4" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="4" y1="8" x2="8" y2="8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Reportes PDF
    </div>
  </div>
  <div class="sidebar-footer">
    <div class="sync-label">Último sync</div>
    <div class="sync-val" id="sync-val">—</div>
    <div class="sync-rel" id="sync-rel"></div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="pg-t" id="pg-t">Dashboard</div>
    <div class="topbar-right">
      <div class="dark-btn" onclick="toggleDark()" id="dark-btn">🌙 Oscuro</div>
      <div class="chip" id="fecha-chip">—</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="sec-dashboard" class="section on">
    <div id="dash-content"><div class="loading"><div class="spinner"></div> Cargando datos...</div></div>
  </div>

  <!-- PROGRESO -->
  <div id="sec-progreso" class="section">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      <span style="font-size:11px;color:var(--text2);">Rango:</span>
      <div class="range-tabs">
        <div class="rtab on" onclick="setRango(30,this)">30d</div>
        <div class="rtab" onclick="setRango(60,this)">60d</div>
        <div class="rtab" onclick="setRango(90,this)">90d</div>
      </div>
    </div>
    <div class="prog-grid">
      <div class="card"><div class="cl">Grasa corporal <span style="color:var(--green)">— meta 22%</span></div><div class="prog-chart-wrap"><canvas id="cGrasa"></canvas></div></div>
      <div class="card"><div class="cl">Peso — con tendencia lineal</div><div class="prog-chart-wrap"><canvas id="cPeso"></canvas></div></div>
      <div class="card"><div class="cl">Músculo esquelético</div><div class="prog-chart-wrap"><canvas id="cMusculo"></canvas></div></div>
      <div class="card"><div class="cl">Agua corporal <span style="color:var(--blue)">— meta 53%</span></div><div class="prog-chart-wrap"><canvas id="cAgua"></canvas></div></div>
    </div>
  </div>

  <!-- PLAN SEMANAL -->
  <div id="sec-plan" class="section">
    <div id="plan-content"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- REPORTES -->
  <div id="sec-reportes" class="section">
    <div id="rep-content"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>
</div>

<script>
const API = '';
let _data = null;
let _charts = {};
let _rangoActual = 30;

// ── MIME ESPAÑOL ──────────────────────────────────────────────────────────────
const MIMO_ES = {
  'CUTTING_LIMPIO':  { color: 'var(--green)',  desc: 'Déficit funcionando correctamente — quemando grasa sin perder músculo.' },
  'RECOMPOSICION':   { color: 'var(--purple)', desc: 'Recomposición activa — grasa bajando y músculo subiendo simultáneamente.' },
  'CATABOLISMO':     { color: 'var(--red)',    desc: 'Pérdida de músculo sin quema de grasa — aumenta carbohidratos peri-entrenamiento.' },
  'ESTANCAMIENTO':   { color: 'var(--amber)',  desc: 'Sin progreso en composición — el metabolismo se adaptó al déficit actual.' },
  'ZONA_GRIS':       { color: 'var(--text2)',  desc: 'Señales mixtas — puede ser fluctuación hídrica. Observar la tendencia.' },
};

// ── NAV ────────────────────────────────────────────────────────────────────────
const TITLES = { dashboard:'Dashboard', progreso:'Progreso', plan:'Plan semanal', reportes:'Reportes PDF' };
function nav(id, el) {
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('on'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('sec-'+id).classList.add('on');
  document.getElementById('pg-t').textContent = TITLES[id];
  if (id === 'progreso') renderProgreso(_rangoActual);
  if (id === 'plan' && _data) renderPlan(_data);
  if (id === 'reportes') loadReportes();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt = (v, d=1) => v != null ? Number(v).toFixed(d) : '—';
const fmtN = v => v != null ? Number(v).toLocaleString('es-MX') : '—';
const sign = v => v > 0 ? '+' : '';

function badge(sem) {
  if (sem === 'rojo')     return '<span class="badge b-red">Alto</span>';
  if (sem === 'amarillo') return '<span class="badge b-amber">Medio</span>';
  if (sem === 'verde')    return '<span class="badge b-green">OK</span>';
  return '<span class="nd">—</span>';
}

function statusPill(g) {
  if (g <= 17) return '<span class="status-pill pill-green">Atlético</span>';
  if (g <= 24) return '<span class="status-pill pill-green">Saludable</span>';
  if (g <= 27) return '<span class="status-pill pill-amber">Aceptable</span>';
  return '<span class="status-pill pill-red">Zona de riesgo</span>';
}

function timeAgo(fechaStr) {
  if (!fechaStr) return '';
  const diff = Math.floor((Date.now() - new Date(fechaStr).getTime()) / 86400000);
  if (diff === 0) return 'hoy';
  if (diff === 1) return 'hace 1 día';
  return `hace ${diff} días`;
}

function chartColors() {
  const dark = document.body.classList.contains('dark');
  return {
    grid: dark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)',
    tick: dark ? '#6f6f6b' : '#a8a8a4',
  };
}

// ── RENDER PROGRESO ───────────────────────────────────────────────────────────
async function renderProgreso(dias) {
  _rangoActual = dias;
  let hist;
  try {
    const res = await fetch(API + `/api/historial?dias=${dias}`);
    const data = await res.json();
    hist = data.datos || [];
  } catch(e) { return; }

  if (!hist.length) return;

  const labels   = hist.map(r => r.Fecha.slice(5));
  const pesos    = hist.map(r => r.Peso_kg);
  const grasas   = hist.map(r => r.Grasa_Porcentaje);
  const musculos = hist.map(r => r.Musculo_Pct);
  const aguas    = hist.map(r => r.Agua);
  const cc       = chartColors();

  function linReg(data) {
    const n = data.filter(Boolean).length;
    if (n < 3) return null;
    const xs = data.map((_,i)=>i);
    const sumX = xs.reduce((a,b)=>a+b,0), sumY = data.reduce((a,b)=>a+(b||0),0);
    const sumXY = xs.reduce((s,x,i)=>s+x*(data[i]||0),0);
    const sumX2 = xs.reduce((s,x)=>s+x*x,0);
    const m = (n*sumXY - sumX*sumY)/(n*sumX2 - sumX*sumX);
    const b = (sumY - m*sumX)/n;
    return xs.map(x => Math.round((m*x+b)*100)/100);
  }

  function mkChart(id, data, color, meta, unit) {
    const ctx = document.getElementById(id);
    if (!ctx) return;
    if (_charts[id]) _charts[id].destroy();
    const valid = data.filter(Boolean);
    const minV = Math.min(...valid) - 0.5;
    const maxV = Math.max(...valid) + 0.5;
    const trend = linReg(data);
    const ds = [{
      data, borderColor: color, backgroundColor: color+'18',
      pointRadius:2, borderWidth:1.5, tension:0.3, fill:true
    }];
    if (trend) ds.push({ data:trend, borderColor:color, borderDash:[5,3], borderWidth:1, pointRadius:0, fill:false });
    _charts[id] = new Chart(ctx, {
      type:'line',
      data:{ labels, datasets:ds },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:v=>v.raw+unit}},
          annotation: meta ? { annotations:{ meta:{ type:'line', yMin:meta, yMax:meta, borderColor:'#166534', borderWidth:1.5, borderDash:[6,3] }}} : {}
        },
        scales:{
          y:{ min:Math.floor(minV), max:Math.ceil(maxV), ticks:{font:{size:10},color:cc.tick,callback:v=>v+unit}, grid:{color:cc.grid} },
          x:{ ticks:{font:{size:10},color:cc.tick,maxRotation:0,maxTicksLimit:7}, grid:{display:false} }
        }
      }
    });
  }

  mkChart('cGrasa',   grasas,   '#dc2626', 22,   '%');
  mkChart('cPeso',    pesos,    '#1a56db', null, ' kg');
  mkChart('cMusculo', musculos, '#7c3aed', null, '%');
  mkChart('cAgua',    aguas,    '#0ea5e9', 53,   '%');
}

function setRango(dias, el) {
  document.querySelectorAll('.rtab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  renderProgreso(dias);
}

// ── RENDER PLAN ───────────────────────────────────────────────────────────────
function renderPlan(d) {
  const dias = d.dias_plan;
  if (!dias || !dias.length) {
    document.getElementById('plan-content').innerHTML = '<div class="card" style="color:var(--text2);font-size:12px">Plan no disponible. Se genera cada domingo.</div>';
    return;
  }
  const TIPO = { 'GYM':['gym','gym'], 'CASA':['casa','casa'], 'FIN DE SEMANA':['finde','finde'], 'RESETEO':['reset','reset'] };
  const html = dias.map(dia => {
    const [hcls, ncls] = TIPO[dia.tipo] || ['reset','reset'];
    return `<div class="plan-day-card">
      <div class="plan-day-hd ${hcls}">
        <span class="plan-day-name ${ncls}">${dia.nombre}</span>
        <span class="plan-day-sub">${dia.subtitulo||''}</span>
      </div>
      <div class="plan-meals">
        ${dia.comidas.map(c=>`
          <div class="plan-meal">
            <div class="plan-meal-l">${c.label}</div>
            <div class="plan-meal-t">${c.texto}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
  document.getElementById('plan-content').innerHTML = `<div class="fade-up">${html}</div>`;
}

// ── LOAD REPORTES ─────────────────────────────────────────────────────────────
async function loadReportes() {
  try {
    const res  = await fetch(API + '/api/reportes');
    const data = await res.json();
    const rows = data.reportes || [];
    if (!rows.length) {
      document.getElementById('rep-content').innerHTML = '<div class="card" style="color:var(--text2);font-size:12px">Sin reportes semanales aún.</div>';
      return;
    }
    const html = `<div class="card fade-up">
      <table class="rep-table">
        <thead><tr>
          <th>Fecha</th><th>Score</th><th>Diagnóstico MIMO</th><th>Δ Peso</th><th>PDF</th>
        </tr></thead>
        <tbody>
          ${rows.map(r => {
            const fecha = r.fecha ? r.fecha.slice(0,10) : null;
            const mimo  = MIMO_ES[r.estado_mimo] || {};
            const dp    = r.delta_peso;
            return `<tr>
              <td style="font-family:var(--mono)">${fecha||'—'}</td>
              <td><span style="color:var(--blue);font-weight:600;font-family:var(--mono)">${r.score_comp||'—'}</span></td>
              <td style="color:${mimo.color||'var(--text2)'};">${r.estado_mimo||'—'}</td>
              <td style="font-family:var(--mono);${dp<0?'color:var(--green)':'color:var(--red)'}">${dp!=null?(dp>0?'+':'')+Number(dp).toFixed(2)+' kg':'—'}</td>
              <td>${fecha ? `<a class="dl-btn" href="${API}/api/pdf/${fecha}" target="_blank">Descargar</a>` : '<span class="nd">—</span>'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
    document.getElementById('rep-content').innerHTML = html;
  } catch(e) {
    document.getElementById('rep-content').innerHTML = '<div class="card" style="color:var(--red);font-size:12px">Error cargando reportes.</div>';
  }
}

// ── DARK MODE ─────────────────────────────────────────────────────────────────
function toggleDark() {
  const dark = document.body.classList.toggle('dark');
  localStorage.setItem('dark', dark);
  document.getElementById('dark-btn').textContent = dark ? '☀️ Claro' : '🌙 Oscuro';
  Object.values(_charts).forEach(c => c && c.destroy());
  _charts = {};
  if (_data) renderDash(_data);
  if (document.getElementById('sec-progreso').classList.contains('on')) renderProgreso(_rangoActual);
}

if (localStorage.getItem('dark') === 'true') {
  document.body.classList.add('dark');
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('dark-btn');
    if (btn) btn.textContent = '☀️ Claro';
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(API + '/api/dashboard');
    if (!res.ok) throw new Error('HTTP '+res.status);
    _data = await res.json();

    document.getElementById('sync-val').textContent  = _data.sync || '—';
    document.getElementById('sync-rel').textContent  = timeAgo(_data.sync);
    document.getElementById('fecha-chip').textContent = _data.fecha_hoy || '—';

    renderDash(_data);
  } catch(e) {
    document.getElementById('dash-content').innerHTML = `
      <div class="card" style="color:var(--red);font-size:12px;padding:20px">
        Error al cargar datos: ${e.message}<br>
        <span style="color:var(--text2)">Verifica que la API esté corriendo en Railway.</span>
      </div>`;
  }
}

// Auto-refresh cada 5 minutos
setInterval(async () => {
  try {
    const res = await fetch(API + '/api/dashboard');
    if (!res.ok) return;
    _data = await res.json();
    document.getElementById('sync-val').textContent = _data.sync || '—';
    document.getElementById('sync-rel').textContent = timeAgo(_data.sync);
    if (document.getElementById('sec-dashboard').classList.contains('on')) {
      Object.entries(_charts).forEach(([k,c]) => { if(k==='w' && c) c.destroy(); });
      delete _charts.w;
      renderDash(_data);
    }
  } catch(e) {}
}, 5 * 60 * 1000);

init();
</script>
