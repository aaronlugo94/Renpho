<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Metabólico — Aaron</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #f8fafc;
    --surface: #ffffff;
    --surface2:#f1f5f9;
    --border:  #e2e8f0;
    --text:    #0f172a;
    --text2:   #64748b;
    --text3:   #94a3b8;
    --blue:    #185FA5;
    --blue-bg: #eff6ff;
    --green:   #3B6D11;
    --green-bg:#f0fdf4;
    --red:     #A32D2D;
    --red-bg:  #fef2f2;
    --amber:   #854F0B;
    --amber-bg:#fffbeb;
    --r:       8px;
    --rl:      12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.5; }

  /* SHELL */
  .shell { display: grid; grid-template-columns: 196px 1fr; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border);
             padding: 20px 0; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
  .logo { padding: 0 16px 16px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .logo-t { font-size: 13px; font-weight: 600; color: var(--text); }
  .logo-s { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .nav { display: flex; flex-direction: column; gap: 2px; padding: 0 8px; }
  .ni { display: flex; align-items: center; gap: 8px; padding: 7px 10px; font-size: 12px;
        color: var(--text2); cursor: pointer; border-radius: var(--r); border-left: 2px solid transparent;
        transition: background .15s; }
  .ni:hover { background: var(--surface2); }
  .ni.on { color: var(--text); background: var(--blue-bg); font-weight: 600; border-left: 2px solid var(--blue); }
  .ni svg { flex-shrink: 0; }
  .sync { margin-top: auto; padding: 14px 16px 0; border-top: 1px solid var(--border);
          font-size: 10px; color: var(--text2); line-height: 1.7; }
  .sync b { color: var(--text); font-weight: 600; }

  /* MAIN */
  .main { padding: 24px 28px; overflow-y: auto; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .pg-t { font-size: 16px; font-weight: 600; }
  .chip { font-size: 11px; color: var(--text2); background: var(--surface); border: 1px solid var(--border);
          padding: 4px 10px; border-radius: var(--r); }

  /* LOADING / ERROR */
  .loading { display: flex; align-items: center; justify-content: center; height: 300px;
             color: var(--text2); font-size: 13px; gap: 8px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--blue);
             border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--rl); padding: 16px; }
  .cl { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase;
        letter-spacing: .06em; margin-bottom: 12px; }

  /* KPI STRIP */
  .kpis { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 12px; }
  .kpi { background: var(--surface2); border-radius: var(--r); padding: 10px 12px; }
  .kl { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; font-weight: 600; }
  .kv { font-size: 20px; font-weight: 600; color: var(--text); }
  .kv small { font-size: 11px; font-weight: 400; color: var(--text2); }
  .ks { font-size: 10px; margin-top: 2px; }
  .cg { color: var(--green); } .cr { color: var(--red); } .cn { color: var(--text2); } .cb { color: var(--blue); }

  /* ROW 1 */
  .r1 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }

  /* FAT ARC */
  .fat-inner { display: flex; align-items: center; gap: 14px; }
  .arc-wrap { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
  .arc-center { position: absolute; inset: 0; display: flex; flex-direction: column;
                align-items: center; justify-content: center; }
  .arc-pct { font-size: 24px; font-weight: 600; color: var(--text); }
  .arc-lbl { font-size: 9px; color: var(--text2); }
  .fat-right { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .status-pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 3px;
                 align-self: flex-start; }
  .pill-red    { background: var(--red-bg);   color: var(--red); }
  .pill-amber  { background: var(--amber-bg); color: var(--amber); }
  .pill-green  { background: var(--green-bg); color: var(--green); }
  .fat-stat { font-size: 11px; color: var(--text2); line-height: 1.7; }
  .fat-stat b { color: var(--text); }
  .ranges-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .rpill { display: flex; align-items: center; gap: 3px; padding: 2px 6px; border-radius: 3px;
           font-size: 9px; font-weight: 600; }
  .rpill-g   { background: var(--green-bg); color: var(--green); }
  .rpill-b   { background: var(--blue-bg);  color: var(--blue); }
  .rpill-a   { background: var(--amber-bg); color: var(--amber); }
  .rpill-r   { background: var(--red-bg);   color: var(--red); }
  .rdot { width: 5px; height: 5px; border-radius: 50%; }

  /* PROYECCIÓN */
  .pbar-wrap { margin: 4px 0 10px; }
  .pbar-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--text2); margin-bottom: 3px; }
  .pbar { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .pbar-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width .5s; }
  .pr { display: grid; grid-template-columns: 1fr auto; align-items: start; padding: 5px 0;
        border-bottom: 1px solid var(--border); font-size: 11px; gap: 8px; }
  .pr:last-child { border-bottom: none; }
  .pr-l { color: var(--text2); }
  .pr-r { font-weight: 600; text-align: right; }
  .pr-note { font-size: 9px; color: var(--text3); text-align: right; }

  /* ESTADO METABÓLICO */
  .eg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .eg { background: var(--surface2); border-radius: var(--r); padding: 7px 10px; }
  .eg-l { font-size: 9px; color: var(--text2); margin-bottom: 2px; font-weight: 600; }
  .eg-v { font-size: 12px; font-weight: 600; color: var(--text); }
  .tend-big { font-size: 24px; font-weight: 600; margin-top: 8px; }

  /* ROW 2 */
  .r2 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .cw { position: relative; height: 155px; width: 100%; }

  /* TELEMETRÍA */
  .mr { display: grid; grid-template-columns: 1fr 56px 46px; align-items: center;
        padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
  .mr:last-child { border-bottom: none; }
  .mn { color: var(--text2); }
  .mv { font-weight: 600; text-align: right; }
  .md { text-align: right; }
  .badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
  .b-red    { background: var(--red-bg);   color: var(--red); }
  .b-amber  { background: var(--amber-bg); color: var(--amber); }
  .b-green  { background: var(--green-bg); color: var(--green); }
  .nd       { color: var(--text3); }

  /* ALERTAS */
  .al { display: flex; gap: 7px; padding: 7px 9px; background: var(--red-bg); border-radius: var(--r);
        border-left: 2px solid #E24B4A; font-size: 10px; color: #7f1d1d; line-height: 1.4;
        margin-bottom: 6px; }
  .al-dot { width: 4px; height: 4px; border-radius: 50%; background: #E24B4A; margin-top: 4px; flex-shrink: 0; }
  .al-amber { background: var(--amber-bg); border-left-color: #d97706; color: #78350f; }
  .al-amber .al-dot { background: #d97706; }

  /* MACROS GRID */
  .macros-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .mg { background: var(--surface2); border-radius: var(--r); padding: 7px 9px; text-align: center; }
  .mg-l { font-size: 9px; color: var(--text2); margin-bottom: 2px; font-weight: 600; }
  .mg-v { font-size: 15px; font-weight: 600; }

  /* PLAN */
  .plan-grid { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 8px; }
  .pmeal { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
  .pmeal-h { padding: 5px 8px; font-size: 10px; font-weight: 600; }
  .pmeal-h.gym  { background: #dbeafe; color: #1e3a5f; }
  .pmeal-h.col  { background: #dcfce7; color: #14532d; }
  .pmeal-h.alm  { background: #f1f5f9; color: var(--text2); }
  .pmeal-h.cen  { background: #e0f2fe; color: #0c4a6e; }
  .pmeal-b { padding: 6px 8px; font-size: 10px; color: var(--text); line-height: 1.5; }

  /* SECTIONS */
  .section { display: none; }
  .section.on { display: block; }
</style>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">
      <div class="logo-t">Control Metabólico</div>
      <div class="logo-s">Aaron · Sistema autónomo</div>
    </div>
    <div class="nav">
      <div class="ni on" onclick="showSection('dashboard',this)">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="1" width="5" height="5" rx="1" fill="#185FA5"/>
          <rect x="8" y="1" width="5" height="5" rx="1" fill="#B5D4F4"/>
          <rect x="1" y="8" width="5" height="5" rx="1" fill="#B5D4F4"/>
          <rect x="8" y="8" width="5" height="5" rx="1" fill="#B5D4F4"/>
        </svg>
        Dashboard
      </div>
      <div class="ni" onclick="showSection('progreso',this)">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <polyline points="1,11 4,7 7,9 10,4 13,6" stroke="#888" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        </svg>
        Progreso
      </div>
      <div class="ni" onclick="showSection('plan',this)">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <rect x="1" y="2" width="12" height="10" rx="1.5" stroke="#888" stroke-width="1.2" fill="none"/>
          <line x1="1" y1="6" x2="13" y2="6" stroke="#888" stroke-width="1.2"/>
          <line x1="4" y1="0" x2="4" y2="4" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="10" y1="0" x2="10" y2="4" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        Plan semanal
      </div>
      <div class="ni" onclick="showSection('reportes',this)">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <path d="M2 1h10a1 1 0 011 1v10a1 1 0 01-1 1H2a1 1 0 01-1-1V2a1 1 0 011-1z" stroke="#888" stroke-width="1.2" fill="none"/>
          <line x1="4" y1="5" x2="10" y2="5" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="4" y1="8" x2="8" y2="8" stroke="#888" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        Reportes PDF
      </div>
    </div>
    <div class="sync">Último sync<br><b id="sync-time">—</b></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="pg-t" id="pg-title">Dashboard</div>
      <div class="chip" id="fecha-hoy">—</div>
    </div>

    <!-- DASHBOARD -->
    <div id="sec-dashboard" class="section on">
      <div id="dash-content"><div class="loading"><div class="spinner"></div> Cargando datos...</div></div>
    </div>

    <!-- PROGRESO -->
    <div id="sec-progreso" class="section">
      <div class="card">
        <div class="cl">Evolución de peso y grasa</div>
        <div style="position:relative;height:280px;"><canvas id="progresoChart"></canvas></div>
      </div>
    </div>

    <!-- PLAN SEMANAL -->
    <div id="sec-plan" class="section">
      <div id="plan-content"><div class="loading"><div class="spinner"></div> Cargando plan...</div></div>
    </div>

    <!-- REPORTES -->
    <div id="sec-reportes" class="section">
      <div id="reportes-content"><div class="loading"><div class="spinner"></div> Cargando historial...</div></div>
    </div>
  </div>
</div>

<script>
const API = '';
let _data = null;
let _charts = {};

// ── NAVEGACIÓN ────────────────────────────────────────────────────────────────
const TITLES = { dashboard:'Dashboard', progreso:'Progreso', plan:'Plan semanal', reportes:'Reportes PDF' };
function showSection(id, el) {
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('on'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('sec-'+id).classList.add('on');
  document.getElementById('pg-title').textContent = TITLES[id];
  if (id === 'progreso' && _data) renderProgreso(_data);
  if (id === 'plan' && _data) renderPlan(_data);
  if (id === 'reportes') loadReportes();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt = (v, dec=1) => v != null ? Number(v).toFixed(dec) : '—';
const fmtN = v => v != null ? Number(v).toLocaleString('es-MX') : '—';

function badge(sem) {
  if (sem === 'rojo')    return '<span class="badge b-red">Alto</span>';
  if (sem === 'amarillo')return '<span class="badge b-amber">Medio</span>';
  if (sem === 'verde')   return '<span class="badge b-green">OK</span>';
  return '<span class="nd">—</span>';
}

function deltaFmt(v, inv=false) {
  if (v == null || Math.abs(v) < 0.05) return '<span class="nd">—</span>';
  const good = inv ? v < 0 : v > 0;
  const arrow = v < 0 ? '▼' : '▲';
  const cls = good ? 'cg' : 'cr';
  return `<span class="${cls}">${arrow} ${Math.abs(v).toFixed(2)}</span>`;
}

function statusPill(grasa) {
  if (grasa <= 17) return '<span class="status-pill pill-green">Atlético</span>';
  if (grasa <= 24) return '<span class="status-pill pill-green">Saludable</span>';
  if (grasa <= 27) return '<span class="status-pill pill-amber">Aceptable</span>';
  return '<span class="status-pill pill-red">Zona de riesgo</span>';
}

function arcPath(pct, max=50) {
  // pct = current %, max = 50 (máximo del arco = 50%)
  const ratio   = Math.min(pct / max, 1);
  const circum  = 2 * Math.PI * 42;
  const dash    = ratio * circum;
  const offset  = circum;
  return { circum, dash, offset };
}

// ── RENDER DASHBOARD ──────────────────────────────────────────────────────────
function renderDash(d) {
  const t  = d.telemetria;
  const c  = d.composicion;
  const e  = d.energia;
  const p  = d.proyeccion;
  const gr = d.grafica;

  // Arco grasa
  const circum = 2 * Math.PI * 42;
  const ratio  = Math.min(t.grasa / 50, 1);  // max visual = 50%
  const dash   = ratio * circum;
  // marcador meta 22%
  const metaRatio  = 22 / 50;
  const metaDash   = metaRatio * circum;

  // Proyección progress bar
  const ppTotal  = t.grasa - 22;
  const ppProgress = 0; // siempre 0 al inicio, sube conforme baje

  // Déficit color
  const defColor = e.deficit < -50 ? 'var(--green)' : e.deficit > 50 ? 'var(--red)' : 'var(--amber)';
  const defLabel = e.deficit < 0 ? `−${Math.abs(e.deficit).toLocaleString('es-MX')} kcal déficit` : `+${e.deficit} kcal superávit`;

  // MIMO color
  const mimoColor = {
    'CUTTING_LIMPIO':'var(--green)','RECOMPOSICION':'#6d28d9',
    'CATABOLISMO':'var(--red)','ESTANCAMIENTO':'var(--amber)','ZONA_GRIS':'var(--text2)'
  }[c.estado_mimo] || 'var(--text2)';

  const html = `
  <div class="kpis">
    <div class="kpi"><div class="kl">Peso actual</div>
      <div class="kv">${fmt(t.peso)} <small>kg</small></div>
      <div class="ks cn">Tendencia 28d: ${c.tendencia_kg_sem != null ? (c.tendencia_kg_sem > 0 ? '+' : '') + fmt(c.tendencia_kg_sem) + ' kg/sem' : '—'}</div></div>
    <div class="kpi"><div class="kl">Grasa corporal</div>
      <div class="kv cr">${fmt(t.grasa)} <small>%</small></div>
      <div class="ks cn">Meta: 22% · faltan ${fmt(p.pp_faltan)} pp</div></div>
    <div class="kpi"><div class="kl">Score composición</div>
      <div class="kv cb">${c.score} <small>/100</small></div>
      <div class="ks cn">Zona de riesgo</div></div>
    <div class="kpi"><div class="kl">Déficit hoy</div>
      <div class="kv" style="color:${defColor}">${Math.abs(e.deficit).toLocaleString('es-MX')} <small>kcal</small></div>
      <div class="ks cn">${defLabel}</div></div>
  </div>

  <div class="r1">
    <!-- Fat hero -->
    <div class="card">
      <div class="cl">Grasa corporal — meta principal</div>
      <div class="fat-inner">
        <div class="arc-wrap">
          <svg width="110" height="110" viewBox="0 0 110 110">
            <circle cx="55" cy="55" r="42" fill="none" stroke="#f1f5f9" stroke-width="8"/>
            <circle cx="55" cy="55" r="42" fill="none" stroke="#E24B4A" stroke-width="8"
              stroke-dasharray="${dash.toFixed(1)} ${circum.toFixed(1)}"
              stroke-dashoffset="${(circum * 0.25).toFixed(1)}"
              stroke-linecap="round" transform="rotate(-90 55 55)"/>
            <circle cx="55" cy="55" r="42" fill="none" stroke="#3B6D11" stroke-width="8"
              stroke-dasharray="3 ${(circum-3).toFixed(1)}"
              stroke-dashoffset="${(-(metaDash - circum * 0.25)).toFixed(1)}"
              transform="rotate(-90 55 55)"/>
          </svg>
          <div class="arc-center">
            <div class="arc-pct">${fmt(t.grasa)}%</div>
            <div class="arc-lbl">grasa corp.</div>
          </div>
        </div>
        <div class="fat-right">
          ${statusPill(t.grasa)}
          <div class="fat-stat">
            Meta: <b>22%</b> · faltan <b>${fmt(p.pp_faltan)} pp</b><br>
            ~<b>${fmt(p.kg_a_quemar)} kg</b> de grasa<br>
            FFM: <b>${fmt(t.ffm)} kg</b>
          </div>
          <div class="ranges-row">
            <div class="rpill rpill-g"><div class="rdot" style="background:#3B6D11"></div>10–17%</div>
            <div class="rpill rpill-b"><div class="rdot" style="background:#185FA5"></div>18–24%</div>
            <div class="rpill rpill-a"><div class="rdot" style="background:#BA7517"></div>25–27%</div>
            <div class="rpill rpill-r"><div class="rdot" style="background:#E24B4A"></div>28%+ ◀</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Proyección -->
    <div class="card">
      <div class="cl">Proyección a meta — 22% grasa</div>
      <div class="pbar-wrap">
        <div class="pbar-labels"><span>${fmt(t.grasa)}% hoy</span><b style="color:var(--blue)">meta 22%</b></div>
        <div class="pbar"><div class="pbar-fill" style="width:0%"></div></div>
        <div style="font-size:9px;color:var(--text3);margin-top:2px">Faltan ${fmt(p.pp_faltan)} pp · ~${fmt(p.kg_a_quemar)} kg de grasa</div>
      </div>
      <div class="pr"><span class="pr-l">Ritmo óptimo</span><div>
        <div class="pr-r cb">−0.5% / sem</div>
        <div class="pr-note">máx. sin perder músculo</div></div></div>
      <div class="pr"><span class="pr-l">Semanas estimadas</span><div>
        <div class="pr-r">~${fmt(p.sem_optimo, 0)} sem</div></div></div>
      <div class="pr"><span class="pr-l">ETA ritmo óptimo</span><div>
        <div class="pr-r cg">${p.fecha_optimo}</div></div></div>
      <div class="pr"><span class="pr-l">Tendencia actual (28d)</span><div>
        <div class="pr-r">${p.tendencia_kg_sem != null ? (p.tendencia_kg_sem > 0 ? '+' : '') + fmt(p.tendencia_kg_sem) + ' kg/sem' : '—'}</div></div></div>
      <div class="pr"><span class="pr-l">ETA ritmo actual</span><div>
        <div class="pr-r cb">${p.fecha_actual}</div>
        <div class="pr-note">${p.sem_actual ? '~' + p.sem_actual + ' semanas' : ''}</div></div></div>
    </div>

    <!-- Estado metabólico -->
    <div class="card">
      <div class="cl">Estado metabólico autónomo</div>
      <div class="eg-grid">
        <div class="eg"><div class="eg-l">MIMO</div>
          <div class="eg-v" style="color:${mimoColor}">${c.estado_mimo}</div></div>
        <div class="eg"><div class="eg-l">SISO activo</div>
          <div class="eg-v">${fmt(c.mult, 1)} kcal/kg</div></div>
        <div class="eg"><div class="eg-l">BMR</div>
          <div class="eg-v">${fmtN(e.bmr)} kcal</div></div>
        <div class="eg"><div class="eg-l">TDEE estimado</div>
          <div class="eg-v">${fmtN(e.tdee)} kcal</div></div>
        <div class="eg"><div class="eg-l">Ingesta objetivo</div>
          <div class="eg-v">${fmtN(e.calorias)} kcal</div></div>
        <div class="eg"><div class="eg-l">Déficit real</div>
          <div class="eg-v" style="color:${defColor}">${e.deficit > 0 ? '+' : ''}${e.deficit} kcal</div></div>
      </div>
      <div style="height:1px;background:var(--border);margin:10px 0"></div>
      <div class="cl" style="margin-bottom:4px">Tendencia 28 días</div>
      <div class="tend-big ${c.tendencia_kg_sem < 0 ? 'cg' : 'cr'}">
        ${c.tendencia_kg_sem != null ? (c.tendencia_kg_sem > 0 ? '+' : '') + fmt(c.tendencia_kg_sem) : '—'}
        <span style="font-size:12px;font-weight:400;color:var(--text2)"> kg/semana</span>
      </div>
      <div style="font-size:10px;color:var(--green);margin-top:2px">
        ${c.tendencia_kg_sem && c.tendencia_kg_sem < -0.25 && c.tendencia_kg_sem > -1.0 ? 'Zona óptima de cutting' :
          c.tendencia_kg_sem && c.tendencia_kg_sem < -1.0 ? '⚠ Pérdida demasiado rápida' :
          c.tendencia_kg_sem && c.tendencia_kg_sem > -0.1 ? 'Sin déficit suficiente' : ''}
      </div>
    </div>
  </div>

  <div class="r2">
    <!-- Gráfica peso -->
    <div class="card">
      <div class="cl">Peso — últimos 90 días</div>
      <div class="cw"><canvas id="weightChart"></canvas></div>
    </div>

    <!-- Telemetría -->
    <div class="card">
      <div class="cl">Telemetría corporal</div>
      <div>
        <div class="mr"><span class="mn">Grasa corporal</span><span class="mv">${fmt(t.grasa)}%</span><span class="md">${badge(t.grasa_sem)}</span></div>
        <div class="mr"><span class="mn">Músculo esquelético</span><span class="mv">${fmt(t.musculo)}%</span><span class="md nd">—</span></div>
        <div class="mr"><span class="mn">Grasa visceral</span><span class="mv">${fmt(t.visfat,1)}</span><span class="md">${badge(t.visfat_sem)}</span></div>
        <div class="mr"><span class="mn">Agua corporal</span><span class="mv">${fmt(t.agua)}%</span><span class="md">${badge(t.agua_sem)}</span></div>
        <div class="mr"><span class="mn">Proteína corporal</span><span class="mv">${fmt(t.proteina)}%</span><span class="md">${badge(t.prot_sem)}</span></div>
        <div class="mr"><span class="mn">BMI</span><span class="mv">${fmt(t.bmi,1)}</span><span class="md">${badge(t.bmi_sem)}</span></div>
        <div class="mr"><span class="mn">BMR</span><span class="mv">${fmtN(t.bmr)}</span><span class="md nd">kcal</span></div>
        <div class="mr"><span class="mn">Masa libre de grasa</span><span class="mv">${fmt(t.ffm)} kg</span><span class="md nd">—</span></div>
      </div>
    </div>

    <!-- Alertas + macros -->
    <div class="card">
      <div class="cl">Alertas activas</div>
      ${d.alertas.length ? d.alertas.map(a =>
        `<div class="al ${a.tipo === 'amarillo' ? 'al-amber' : ''}">
          <div class="al-dot"></div>${a.texto}</div>`).join('') :
        '<div style="font-size:11px;color:var(--green)">Sin alertas activas</div>'}
      <div style="height:1px;background:var(--border);margin:10px 0"></div>
      <div class="cl">Macros objetivo hoy</div>
      <div class="macros-grid">
        <div class="mg"><div class="mg-l">Calorías</div><div class="mg-v cb">${fmtN(e.calorias)}</div></div>
        <div class="mg"><div class="mg-l">Proteína</div><div class="mg-v cg">${e.proteina_g}g</div></div>
        <div class="mg"><div class="mg-l">Carbos</div><div class="mg-v" style="color:var(--amber)">${e.carbs_g}g</div></div>
        <div class="mg"><div class="mg-l">Grasas</div><div class="mg-v cr">${e.grasas_g}g</div></div>
      </div>
    </div>
  </div>

  <!-- Plan del día -->
  <div class="card" style="margin-top:0">
    <div class="cl">Plan de hoy</div>
    <div class="plan-grid" id="plan-hoy"></div>
  </div>`;

  document.getElementById('dash-content').innerHTML = html;

  // Plan de hoy — primer día del plan
  const planHoy = document.getElementById('plan-hoy');
  const hoy = d.dias_plan && d.dias_plan[0];
  if (hoy) {
    const colores = { 'Desayuno':'alm','Colación 1':'col','Almuerzo':'alm','Colación 2':'col','Cena':'cen','Rutina':'col' };
    planHoy.innerHTML = hoy.comidas.map(c =>
      `<div class="pmeal">
        <div class="pmeal-h ${colores[c.label] || 'alm'}">${c.label}</div>
        <div class="pmeal-b">${c.texto}</div>
      </div>`).join('');
  } else {
    planHoy.innerHTML = '<div style="font-size:11px;color:var(--text2);grid-column:1/-1">Plan no disponible. Se genera cada domingo.</div>';
  }

  // Gráfica peso
  const ctx = document.getElementById('weightChart');
  if (ctx && gr.labels.length) {
    if (_charts.weight) _charts.weight.destroy();
    _charts.weight = new Chart(ctx, {
      type: 'line',
      data: {
        labels: gr.labels.map(l => l.slice(5)),
        datasets: [{ data: gr.pesos, borderColor: '#185FA5', backgroundColor: 'rgba(24,95,165,0.05)',
          pointBackgroundColor: '#185FA5', pointRadius: 2, borderWidth: 1.5, tension: 0.3, fill: true }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: v => v.raw + ' kg' } } },
        scales: {
          y: { ticks: { font: { size: 10 }, color: '#888', callback: v => v + ' kg' }, grid: { color: 'rgba(0,0,0,0.04)' } },
          x: { ticks: { font: { size: 10 }, color: '#888', maxRotation: 0, maxTicksLimit: 6 }, grid: { display: false } }
        }
      }
    });
  }
}

// ── RENDER PROGRESO ───────────────────────────────────────────────────────────
function renderProgreso(d) {
  const gr = d.grafica;
  const ctx = document.getElementById('progresoChart');
  if (!ctx || !gr.labels.length) return;
  if (_charts.prog) _charts.prog.destroy();
  _charts.prog = new Chart(ctx, {
    type: 'line',
    data: {
      labels: gr.labels.map(l => l.slice(5)),
      datasets: [
        { label: 'Peso (kg)', data: gr.pesos, borderColor: '#185FA5', backgroundColor: 'rgba(24,95,165,0.06)',
          pointRadius: 2, borderWidth: 1.5, tension: 0.3, fill: true, yAxisID: 'y' },
        { label: 'Grasa (%)', data: gr.grasas, borderColor: '#E24B4A', backgroundColor: 'rgba(226,75,74,0.04)',
          pointRadius: 2, borderWidth: 1.5, tension: 0.3, fill: false, yAxisID: 'y2' }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, labels: { font: { size: 11 }, boxWidth: 10 } } },
      scales: {
        y:  { position: 'left',  ticks: { font:{size:10}, color:'#185FA5', callback: v => v+' kg' }, grid:{color:'rgba(0,0,0,0.04)'} },
        y2: { position: 'right', ticks: { font:{size:10}, color:'#E24B4A', callback: v => v+'%'  }, grid:{display:false} },
        x:  { ticks: { font:{size:10}, color:'#888', maxRotation:0, maxTicksLimit:8 }, grid:{display:false} }
      }
    }
  });
}

// ── RENDER PLAN ───────────────────────────────────────────────────────────────
function renderPlan(d) {
  const dias = d.dias_plan;
  if (!dias || !dias.length) {
    document.getElementById('plan-content').innerHTML =
      '<div class="card"><div style="color:var(--text2);font-size:12px">Plan no disponible. Se genera cada domingo.</div></div>';
    return;
  }
  const TIPO_CLS = { 'GYM':'#dbeafe|#1e3a5f', 'CASA':'#dcfce7|#14532d', 'FIN DE SEMANA':'#fef9c3|#713f12', 'RESETEO':'#f1f5f9|#475569' };
  const html = dias.map(dia => {
    const [bg, col] = (TIPO_CLS[dia.tipo] || '#f1f5f9|#475569').split('|');
    return `<div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:${bg};border-radius:8px;margin-bottom:10px">
        <span style="font-size:12px;font-weight:600;color:${col}">${dia.nombre}</span>
        <span style="font-size:10px;color:${col};opacity:.7;margin-left:auto">${dia.subtitulo||''}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px">
        ${dia.comidas.map(c => `
          <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden">
            <div style="background:${bg};padding:4px 8px;font-size:10px;font-weight:600;color:${col}">${c.label}</div>
            <div style="padding:6px 8px;font-size:10px;color:var(--text);line-height:1.5">${c.texto}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
  document.getElementById('plan-content').innerHTML = html;
}

// ── RENDER REPORTES ───────────────────────────────────────────────────────────
async function loadReportes() {
  const res = await fetch(API + '/api/reportes');
  const data = await res.json();
  const rows = data.reportes || [];
  if (!rows.length) {
    document.getElementById('reportes-content').innerHTML =
      '<div class="card"><div style="color:var(--text2);font-size:12px">Sin reportes semanales aún.</div></div>';
    return;
  }
  const html = `<div class="card">
    <div class="cl">Historial de reportes semanales</div>
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="border-bottom:1px solid var(--border)">
        <th style="text-align:left;padding:6px 0;color:var(--text2);font-weight:600">Fecha</th>
        <th style="text-align:right;padding:6px 8px;color:var(--text2);font-weight:600">Score</th>
        <th style="text-align:right;padding:6px 8px;color:var(--text2);font-weight:600">Estado</th>
        <th style="text-align:right;padding:6px 0;color:var(--text2);font-weight:600">Δ Peso</th>
      </tr></thead>
      <tbody>
        ${rows.map(r => `<tr style="border-bottom:1px solid var(--border)">
          <td style="padding:7px 0">${r.fecha ? r.fecha.slice(0,10) : '—'}</td>
          <td style="text-align:right;padding:7px 8px;color:var(--blue);font-weight:600">${r.score_comp || '—'}</td>
          <td style="text-align:right;padding:7px 8px;color:var(--text2)">${r.estado_mimo || '—'}</td>
          <td style="text-align:right;padding:7px 0;${r.delta_peso < 0 ? 'color:var(--green)' : 'color:var(--red)'}">${r.delta_peso != null ? (r.delta_peso > 0 ? '+' : '') + Number(r.delta_peso).toFixed(2) + ' kg' : '—'}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
  document.getElementById('reportes-content').innerHTML = html;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res  = await fetch(API + '/api/dashboard');
    if (!res.ok) throw new Error('API no disponible');
    _data = await res.json();

    document.getElementById('sync-time').textContent = _data.sync || '—';
    document.getElementById('fecha-hoy').textContent  = _data.fecha_hoy || '—';

    renderDash(_data);
  } catch(e) {
    document.getElementById('dash-content').innerHTML =
      `<div class="card"><div style="color:var(--red);font-size:12px">
        Error al cargar datos: ${e.message}<br>
        <span style="color:var(--text2)">Verifica que la API esté corriendo en Railway.</span>
      </div></div>`;
  }
}

init();
</script>
</body>
</html>
